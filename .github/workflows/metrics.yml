name: Metrics

on:
  # Refresh once a day
  schedule:
    - cron: "0 6 * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@v3.34
        with:
          # Personal access token (classic) with repo, read:org, read:user.
          token: ${{ secrets.METRICS_TOKEN }}
          user: Maximilian-Nesslauer
          filename: github-metrics.svg
          template: classic
          config_timezone: Europe/Berlin

          base: header

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 6
          # Skip course repos whose generated output (e.g. knitr HTML) skews the stats.
          plugin_languages_skipped: exeRcise-sheet-6

          # Disabled: the v3.34 achievements query still requests Projects
          # (classic), which GitHub sunset, so it fails with "Unexpected error".
          # Re-enable once upstream PR #1769 (Projects V2 migration) ships.
          plugin_achievements: no
          plugin_achievements_threshold: C
